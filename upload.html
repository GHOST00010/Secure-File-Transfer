<!DOCTYPE html>
<html>

<head>
    <title>Upload</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            background: purple;
            color: white;
        }
    </style>
</head>

<body>
    <h2>Secure File Upload</h2>
    <form method="POST" action="/upload" enctype="multipart/form-data">
        <input type="file" name="file"><br><br>
        <button type="submit">Upload</button>
    </form>
    <br><a href="/logout">Logout</a>
</body>

</html>
